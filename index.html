<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITMC Incident Reporting System</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container-fluid main-container d-flex align-items-center justify-content-center">
    <div class="content text-center">

      <!-- Header -->
      <div class="header d-flex align-items-center justify-content-center flex-wrap">
        <img src="asset/ITMCComCenLogo.png" class="logo me-3" alt="ITMC Logo">
        <div class="divider d-none d-md-block"></div>

        <div class="text-start ms-md-3 mt-3 mt-md-0">
          <h1 class="title">INCIDENT</h1>
          <h2 class="subtitle">REPORTING SYSTEM</h2>
        </div>
      </div>

      <!-- Buttons -->
      <div class="mt-5 button-group">
        <button class="btn custom-btn" onclick="window.location.href='https://tally.so/r/LZgr91'">
          Initial Report
        </button>

        <button class="btn custom-btn" onclick="window.location.href='https://tally.so/r/vGpZGv'">
          Progress Report
        </button>

        <button class="btn custom-btn" onclick="window.location.href='https://tally.so/r/ODg2Q7'">
          Information Report
        </button>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script src="script.js"></script>

</body>

</html>
